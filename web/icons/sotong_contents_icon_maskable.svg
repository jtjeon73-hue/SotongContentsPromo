<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Sotong Contents Promo Maskable">
  <defs>
    <linearGradient id="bgGradM" x1="120" y1="80" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18243A"/>
      <stop offset="50%" stop-color="#101A2B"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="playGradM" x1="360" y1="300" x2="680" y2="680" gradientUnits="userSpaceOnUse">
